syntax = "proto3";

package habit;

option go_package = "pb/habit";

import "google/protobuf/timestamp.proto";

message Habit {
    int32 id = 1;
    int32 user_id = 2;
    string name = 3;
    string description = 4;
    string image_url = 5;
}

message Routine {
    int32 id = 1;
    int32 user_id = 2;
    string name = 3;
    repeated int32 habit_ids = 4;
}

message HabitLog {
    int32 habit_id = 1;
    google.protobuf.Timestamp completed_at = 2;
}

message CreateRoutineRequest {
    Routine routine = 1;
}

message CreateRoutineResponse {
    Routine routine = 1;
}

message CreateHabitRequest {
    Habit habit = 1;
}

message CreateHabitResponse {
    Habit habit = 1;
}

message GetHabitByIDRequest {
    int32 habit_id = 1;
}

message GetHabitByIDResponse {
    Habit habit = 1;
}

message ListHabitsByUserRequest {
    int32 user_id = 1;
}

message ListHabitsByUserResponse {
    repeated Habit habits = 1;
}

message EditHabitRequest {
    int32 habit_id = 1;
    optional string name = 2;
    optional string description = 3;
    optional string image_url = 4;
}

message EditHabitResponse {
    bool success = 1;
}

message DeleteHabitRequest {
    int32 habit_id = 1;
}

message DeleteHabitResponse {
    bool success = 1;
}

message MarkHabitCompletedRequest {
    int32 habit_id = 1;
    google.protobuf.Timestamp start_date = 2;
    google.protobuf.Timestamp end_date = 3;
}

message MarkHabitCompletedResponse {
    bool success = 1;
}

message UnmarkHabitCompletedRequest {
    int32 habit_id = 1;
}

message UnmarkHabitCompletedResponse {
    bool success = 1;
}

message GetHabitLogsRequest {
    int32 habit_id = 1;
    google.protobuf.Timestamp completed_at = 2;
}

message GetHabitLogsResponse {
    repeated HabitLog logs = 1;
}

message AddHabitToRoutineRequest{
    int32 habit_id = 1;
    int32 routine_id = 2;
}

message AddHabitToRoutineResponse {
    bool success = 1;
}

message RemoveHabitFromRoutineRequest {
    int32 habit_id = 1;
    int32 routine_id = 2;
}

message RemoveHabitFromRoutineResponse {
    bool success = 1;
}

message ListRoutinesByUserRequest {
    int32 user_id = 1;
}

message ListRoutinesByUserResponse {
    repeated Routine routines = 1;
}

service HabitService {
    rpc CreateHabit(CreateHabitRequest) returns (CreateHabitResponse);
    rpc CreateRoutine(CreateRoutineRequest) returns (CreateRoutineResponse);
    rpc GetHabitByID(GetHabitByIDRequest) returns (GetHabitByIDResponse);
    rpc ListHabitsByUser(ListHabitsByUserRequest) returns (ListHabitsByUserResponse);
    rpc EditHabit(EditHabitRequest) returns (EditHabitResponse);
    rpc DeleteHabit(DeleteHabitRequest) returns (DeleteHabitResponse);
    rpc MarkHabitCompleted(MarkHabitCompletedRequest) returns (MarkHabitCompletedResponse);
    rpc UnmarkHabitCompleted(UnmarkHabitCompletedRequest) returns (UnmarkHabitCompletedResponse);
    rpc GetHabitLogs(GetHabitLogsRequest) returns (GetHabitLogsResponse);
    rpc AddHabitToRoutine(AddHabitToRoutineRequest) returns (AddHabitToRoutineResponse);
    rpc RemoveHabitFromRoutine(RemoveHabitFromRoutineRequest) returns (RemoveHabitFromRoutineResponse);
    rpc ListRoutinesByUser(ListRoutinesByUserRequest) returns (ListRoutinesByUserResponse);
}