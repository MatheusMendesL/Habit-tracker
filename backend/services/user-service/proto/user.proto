syntax = "proto3";

package user;

option go_package = "./pb/user";

message User {
  int32 id = 1;
  string name = 2;
  string email = 3;
}

message GetUserByIDRequest {
  int32 user_id = 1;
}

message GetUserByIDResponse {
  User user = 1;
}

message ListFollowersRequest {
  int32 user_id = 1;
}

message ListFollowersResponse {
  repeated User followers = 1;
}

message ListFollowingRequest {
  int32 user_id = 1;
}

message ListFollowingResponse {
  repeated User following = 1;
}

message EditUserRequest {
  int32 user_id = 1;
  optional string name = 2;
  optional string email = 3;
}

message EditUserResponse {
  User user = 1;
}

message EditPasswordRequest {
  int32 user_id = 1;
  string new_password = 2;
}

message EditPasswordResponse {
  bool success = 1;
}

message DeleteUserRequest {
  int32 user_id = 1;
}

message DeleteUserResponse {
  bool success = 1;
}

message StartFollowingRequest {
  int32 follower_id = 1;
  int32 followee_id = 2;
}

message StartFollowingResponse {
  bool success = 1;
}

message UnfollowRequest {
  int32 unfollowed_id = 1;
  int32 unfollowing_id = 2;
}

message UnfollowResponse {
  bool success = 1;
}

service UserService {
  rpc GetUserByID(GetUserByIDRequest) returns (GetUserByIDResponse);
  rpc ListFollowers(ListFollowersRequest) returns (ListFollowersResponse);
  rpc ListFollowing(ListFollowingRequest) returns (ListFollowingResponse);
  rpc EditPassword(EditPasswordRequest) returns (EditPasswordResponse);
  rpc StartFollowing(StartFollowingRequest) returns (StartFollowingResponse);
  rpc Unfollow(UnfollowRequest) returns (UnfollowResponse);
  rpc EditUser(EditUserRequest) returns (EditUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}